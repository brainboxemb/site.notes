<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <title>Brainbox Embedded Notes</title>

    <link
        rel="stylesheet"
        href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css"
    >
</head>
<body>
    <div id="app">Loading...</div>

    <script>
        window.$docsify = {
            name: 'Topics',
            repo: '',
            loadSidebar: true,
            relativePath: true,
            subMaxLevel: 2,
            auto2top: true,
            homepage: 'README.md',
            search: {
                placeholder: 'Search notes',
                noData: 'No results found'
            },
            plugins: [
                function(hook, vm) {
                    hook.beforeEach(function(content) {
                        // Definieer hier centraal het pad naar je asset folder op GitHub
                        const assetUrl = 'https://raw.githubusercontent.com/brainboxemb/site.notes/main/assets';
                        
                        // Vervang overal {{asset_url}} door de echte URL voordat de pagina laadt
                        return content.replaceAll('{{asset_url}}', assetUrl);
                    });
                }
            ]
        };
    </script>

    <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
    <!-- Enable image resizing helpers like :size -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/external-script.min.js"></script>
    <!-- Enable click-to-zoom functionality for images (Recommended) -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
    </body>
</html>
